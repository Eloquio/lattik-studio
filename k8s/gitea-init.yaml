apiVersion: batch/v1
kind: Job
metadata:
  name: gitea-init
  namespace: gitea
spec:
  activeDeadlineSeconds: 300
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: curlimages/curl:8.5.0
          envFrom:
            - secretRef:
                name: gitea-webhook-config
          command:
            - sh
            - -c
            - |
              set -e
              GITEA_URL="http://gitea:3000"
              MAX_WAIT=120
              WAITED=0

              echo "Waiting for Gitea to be ready..."
              until curl -sf "$GITEA_URL/api/v1/version" > /dev/null 2>&1; do
                sleep 2
                WAITED=$((WAITED + 2))
                if [ "$WAITED" -ge "$MAX_WAIT" ]; then
                  echo "Timed out waiting for Gitea after ${MAX_WAIT}s"
                  exit 1
                fi
              done
              echo "Gitea is ready (waited ${WAITED}s)."

              # Create admin user (ignore error if already exists)
              curl -sf -X POST "$GITEA_URL/api/v1/admin/users" \
                -H "Content-Type: application/json" \
                -u "lattik-admin:lattik-local" \
                -d '{
                  "username": "lattik-admin",
                  "password": "lattik-local",
                  "email": "admin@lattik.local",
                  "must_change_password": false
                }' || echo "Admin user may already exist, continuing..."

              # Create API token (delete existing first)
              curl -sf -X DELETE "$GITEA_URL/api/v1/users/lattik-admin/tokens/lattik-api" \
                -u "lattik-admin:lattik-local" || true

              TOKEN_RESPONSE=$(curl -sf -X POST "$GITEA_URL/api/v1/users/lattik-admin/tokens" \
                -H "Content-Type: application/json" \
                -u "lattik-admin:lattik-local" \
                -d '{"name": "lattik-api", "scopes": ["all"]}') || TOKEN_RESPONSE=""
              echo "Token response: $TOKEN_RESPONSE"

              # Extract token value — try sha1 first, then plain token field
              TOKEN=$(echo "$TOKEN_RESPONSE" | sed -n 's/.*"sha1"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
              if [ -z "$TOKEN" ]; then
                TOKEN=$(echo "$TOKEN_RESPONSE" | sed -n 's/.*"token"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
              fi

              if [ -z "$TOKEN" ]; then
                echo "Warning: Could not extract token from response. Create one manually at $GITEA_URL."
              else
                echo ""
                echo "============================================"
                echo "GITEA_TOKEN=$TOKEN"
                echo "============================================"
                echo "Add this to your apps/web/.env file."
                echo ""
              fi

              # Create org (ignore if exists)
              curl -sf -X POST "$GITEA_URL/api/v1/orgs" \
                -H "Content-Type: application/json" \
                -u "lattik-admin:lattik-local" \
                -d '{"username": "lattik", "visibility": "private"}' \
                || echo "Org may already exist, continuing..."

              # Create pipelines repo (ignore if exists)
              curl -sf -X POST "$GITEA_URL/api/v1/orgs/lattik/repos" \
                -H "Content-Type: application/json" \
                -u "lattik-admin:lattik-local" \
                -d '{
                  "name": "pipelines",
                  "description": "Lattik pipeline definitions",
                  "private": true,
                  "auto_init": true,
                  "default_branch": "main"
                }' || echo "Repo may already exist, continuing..."

              # Register webhook on pipelines repo — fires on PR merge into
              # main so the web app can generate DAG specs and persist
              # definition state. host.docker.internal is how pods in kind
              # reach the Next.js dev server running on the host (port 3000
              # bypasses portless TLS, which has a cert for lattik-studio.dev
              # and wouldn't match this Host header).
              if [ -z "$GITEA_WEBHOOK_SECRET" ]; then
                echo "Warning: GITEA_WEBHOOK_SECRET is empty — skipping webhook registration."
                echo "Set it in apps/web/.env and re-run 'pnpm gitea:start'."
              else
                # Delete any existing hooks so re-running the init job
                # doesn't stack up duplicates pointing at the same URL.
                EXISTING=$(curl -sf -u "lattik-admin:lattik-local" \
                  "$GITEA_URL/api/v1/repos/lattik/pipelines/hooks" || echo "[]")
                echo "$EXISTING" \
                  | sed -n 's/.*"id"[[:space:]]*:[[:space:]]*\([0-9]*\).*/\1/p' \
                  | while read -r ID; do
                      [ -n "$ID" ] && curl -sf -X DELETE -u "lattik-admin:lattik-local" \
                        "$GITEA_URL/api/v1/repos/lattik/pipelines/hooks/$ID" || true
                    done

                curl -sf -X POST "$GITEA_URL/api/v1/repos/lattik/pipelines/hooks" \
                  -H "Content-Type: application/json" \
                  -u "lattik-admin:lattik-local" \
                  -d "{
                    \"type\": \"gitea\",
                    \"active\": true,
                    \"events\": [\"pull_request\"],
                    \"config\": {
                      \"url\": \"http://host.docker.internal:3000/api/webhooks/gitea\",
                      \"content_type\": \"json\",
                      \"secret\": \"$GITEA_WEBHOOK_SECRET\"
                    }
                  }" > /dev/null && echo "Webhook registered on lattik/pipelines." \
                    || echo "Failed to register webhook. Check Gitea logs."
              fi

              echo "Gitea initialization complete."
              echo "Access Gitea at: http://localhost:3300"
              echo "Credentials: lattik-admin / lattik-local"
