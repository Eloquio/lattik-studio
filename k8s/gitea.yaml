apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-data
  namespace: gitea
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: gitea-secret
  namespace: gitea
type: Opaque
stringData:
  GITEA__database__DB_TYPE: sqlite3
  GITEA__database__PATH: /data/gitea/gitea.db
  GITEA__server__ROOT_URL: http://localhost:3300
  GITEA__server__HTTP_PORT: "3000"
  GITEA__server__SSH_DOMAIN: localhost
  GITEA__server__SSH_PORT: "22"
  GITEA__server__SSH_LISTEN_PORT: "22"
  GITEA__security__INSTALL_LOCK: "true"
  GITEA__service__DISABLE_REGISTRATION: "true"
  # Gitea blocks webhook URLs that resolve to private/loopback addresses by
  # default. The local dev webhook target is host.docker.internal, which
  # resolves into the 192.168.x range — whitelist it so the pipelines repo
  # can fire merge events at the host-side Next.js dev server.
  GITEA__webhook__ALLOWED_HOST_LIST: "*"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: gitea
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitea
  template:
    metadata:
      labels:
        app: gitea
    spec:
      containers:
        - name: gitea
          image: gitea/gitea:1.22
          ports:
            - containerPort: 3000
              name: http
            - containerPort: 22
              name: ssh
          envFrom:
            - secretRef:
                name: gitea-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/v1/version
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/version
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: gitea-data
              mountPath: /data
      volumes:
        - name: gitea-data
          persistentVolumeClaim:
            claimName: gitea-data
---
apiVersion: v1
kind: Service
metadata:
  name: gitea
  namespace: gitea
spec:
  type: NodePort
  selector:
    app: gitea
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30300
    - name: ssh
      port: 22
      targetPort: 22
      nodePort: 30222
