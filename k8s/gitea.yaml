apiVersion: v1
kind: Secret
metadata:
  name: gitea-secret
type: Opaque
stringData:
  GITEA__database__DB_TYPE: sqlite3
  GITEA__database__PATH: /data/gitea/gitea.db
  GITEA__server__ROOT_URL: http://localhost:3300
  GITEA__server__HTTP_PORT: "3000"
  GITEA__server__SSH_DOMAIN: localhost
  GITEA__server__SSH_PORT: "22"
  GITEA__server__SSH_LISTEN_PORT: "22"
  GITEA__security__INSTALL_LOCK: "true"
  GITEA__service__DISABLE_REGISTRATION: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitea
  template:
    metadata:
      labels:
        app: gitea
    spec:
      containers:
        - name: gitea
          image: gitea/gitea:1.22-rootless
          ports:
            - containerPort: 3000
              name: http
            - containerPort: 22
              name: ssh
          envFrom:
            - secretRef:
                name: gitea-secret
          volumeMounts:
            - name: gitea-data
              mountPath: /data
      volumes:
        - name: gitea-data
          hostPath:
            path: /var/local/gitea-data
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: gitea
spec:
  type: NodePort
  selector:
    app: gitea
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30300
    - name: ssh
      port: 22
      targetPort: 22
      nodePort: 30222
