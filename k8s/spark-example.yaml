# Example SparkApplication that exercises the full Iceberg path:
# create a table, insert rows, read them back. Run with:
#
#   pnpm spark:submit-example
#
# After the job completes you can verify the table from Trino:
#
#   pnpm trino:cli
#   trino> SELECT * FROM iceberg.spark_demo.events;
#
# Same iceberg-rest catalog and same MinIO warehouse Trino uses, so
# anything Spark writes is immediately visible to Trino and vice versa.

# The PySpark script we want to run, packaged as a ConfigMap so we don't
# need to bake it into the image. The driver mounts this ConfigMap and
# runs the file directly.
apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-iceberg-example-script
  namespace: workloads
data:
  iceberg_demo.py: |
    """
    Iceberg smoke test: create a schema, write a table, read it back.
    Connects to the same iceberg-rest catalog Trino uses.
    """
    from pyspark.sql import SparkSession
    from datetime import datetime

    spark = SparkSession.builder.appName("iceberg-demo").getOrCreate()

    # Verify the catalog wiring is live
    print("=== current catalog and namespace ===")
    spark.sql("SHOW CURRENT NAMESPACE").show()

    # Create the schema (idempotent — safe to re-run)
    spark.sql("CREATE SCHEMA IF NOT EXISTS iceberg.spark_demo")

    # Create the table — Iceberg, not Hive
    spark.sql("""
        CREATE TABLE IF NOT EXISTS iceberg.spark_demo.events (
            id BIGINT,
            ts TIMESTAMP,
            source STRING,
            msg STRING
        ) USING iceberg
    """)

    # Insert via DataFrame so we exercise the write path properly
    rows = [
        (1, datetime.now(), "spark-example", "first row from spark"),
        (2, datetime.now(), "spark-example", "second row from spark"),
        (3, datetime.now(), "spark-example", "third row from spark"),
    ]
    df = spark.createDataFrame(rows, "id BIGINT, ts TIMESTAMP, source STRING, msg STRING")
    df.writeTo("iceberg.spark_demo.events").append()

    # Read it back
    print("=== iceberg.spark_demo.events ===")
    spark.read.table("iceberg.spark_demo.events").orderBy("id").show(truncate=False)

    print("=== row count ===")
    count = spark.sql("SELECT count(*) FROM iceberg.spark_demo.events").collect()[0][0]
    print(f"row count: {count}")

    spark.stop()
---
apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: iceberg-demo
  namespace: workloads
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: lattik/spark-iceberg:4.0.2-1.10.1
  imagePullPolicy: IfNotPresent
  mainApplicationFile: local:///opt/spark/work-dir/iceberg_demo.py
  sparkVersion: "4.0.2"
  restartPolicy:
    type: Never
  driver:
    cores: 1
    memory: 1024m
    serviceAccount: spark-driver
    envFrom:
      - secretRef:
          name: minio-credentials
    env:
      # AWS SDK v2 (which iceberg-aws-bundle ships) requires a region even
      # when talking to a non-AWS endpoint. The catalog client picks it up
      # from spark.sql.catalog.iceberg.s3.region but the parquet writer path
      # on executors uses the SDK's default chain, which needs AWS_REGION.
      - name: AWS_REGION
        value: us-east-1
    volumeMounts:
      - name: script
        mountPath: /opt/spark/work-dir
  executor:
    cores: 1
    instances: 1
    memory: 1024m
    envFrom:
      - secretRef:
          name: minio-credentials
    env:
      - name: AWS_REGION
        value: us-east-1
  volumes:
    - name: script
      configMap:
        name: spark-iceberg-example-script
  sparkConf:
    # Iceberg extensions — required for CREATE TABLE ... USING iceberg etc.
    spark.sql.extensions: "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions"
    # Catalog: name it `iceberg` to match Trino's catalog name
    spark.sql.catalog.iceberg: "org.apache.iceberg.spark.SparkCatalog"
    spark.sql.catalog.iceberg.catalog-impl: "org.apache.iceberg.rest.RESTCatalog"
    spark.sql.catalog.iceberg.uri: "http://iceberg-rest.iceberg.svc.cluster.local:8181"
    spark.sql.catalog.iceberg.warehouse: "s3://warehouse/"
    spark.sql.catalog.iceberg.io-impl: "org.apache.iceberg.aws.s3.S3FileIO"
    spark.sql.catalog.iceberg.s3.endpoint: "http://minio.minio.svc.cluster.local:9000"
    spark.sql.catalog.iceberg.s3.path-style-access: "true"
    spark.sql.catalog.iceberg.s3.access-key-id: "lattik"
    spark.sql.catalog.iceberg.s3.secret-access-key: "lattik-local"
    spark.sql.catalog.iceberg.s3.region: "us-east-1"
    # Default catalog so unqualified `db.table` references resolve here
    spark.sql.defaultCatalog: "iceberg"
