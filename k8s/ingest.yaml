# Lattik Ingest — lightweight Go service that accepts Protobuf envelopes
# over HTTP and produces them to per-table Kafka topics.
#
# In-cluster:  ingest.workloads:8090
# From host:   localhost:8090  (via NodePort 30090)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest
  namespace: workloads
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingest
  template:
    metadata:
      labels:
        app: ingest
    spec:
      containers:
        - name: ingest
          image: lattik/ingest:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8090
          env:
            - name: KAFKA_BROKERS
              value: "kafka.kafka:9092"
            - name: ADDR
              value: ":8090"
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ingest
  namespace: workloads
spec:
  type: NodePort
  selector:
    app: ingest
  ports:
    - name: http
      port: 8090
      targetPort: 8090
      nodePort: 30090
