# Confluent Schema Registry — stores Protobuf schemas for Logger Table
# payloads in Kafka (topic: _schemas). Stateless: no PVC needed.
#
# In-cluster:  sr.schema-registry:8081
# From host:   localhost:8081  (via NodePort 30081)
#
# The Service is named "sr" (not "schema-registry") to avoid a conflict:
# Kubernetes auto-injects env vars like SCHEMA_REGISTRY_PORT=tcp://...
# from a Service named "schema-registry", and the Confluent image treats
# every SCHEMA_REGISTRY_* env var as a config property, causing a crash.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: schema-registry
  namespace: schema-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: schema-registry
  template:
    metadata:
      labels:
        app: schema-registry
    spec:
      containers:
        - name: schema-registry
          image: confluentinc/cp-schema-registry:7.7.0
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: SCHEMA_REGISTRY_HOST_NAME
              value: "schema-registry"
            - name: SCHEMA_REGISTRY_LISTENERS
              value: "http://0.0.0.0:8081"
            - name: SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS
              value: "kafka.kafka:9092"
            - name: SCHEMA_REGISTRY_KAFKASTORE_TOPIC
              value: "_schemas"
            - name: SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL
              value: "BACKWARD"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: sr
  namespace: schema-registry
spec:
  type: NodePort
  selector:
    app: schema-registry
  ports:
    - name: http
      port: 8081
      targetPort: 8081
      nodePort: 30081
