# Local copy of the minio-secret credentials. K8s secrets are namespace-
# scoped, so iceberg-rest can't reference the one in the minio namespace
# directly. Keep these in lockstep with k8s/minio.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: iceberg
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: lattik
  AWS_SECRET_ACCESS_KEY: lattik-local
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: iceberg-data
  namespace: iceberg
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iceberg-rest
  namespace: iceberg
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iceberg-rest
  template:
    metadata:
      labels:
        app: iceberg-rest
    spec:
      containers:
        - name: iceberg-rest
          image: tabulario/iceberg-rest:1.6.0
          ports:
            - name: rest
              containerPort: 8181
          env:
            # Persist catalog state in sqlite on hostPath. Survives pod restarts.
            - name: CATALOG_URI
              value: jdbc:sqlite:/data/iceberg_rest.db
            - name: CATALOG_JDBC_USER
              value: ""
            - name: CATALOG_JDBC_PASSWORD
              value: ""
            # Warehouse lives in MinIO bucket created by minio-init.
            - name: CATALOG_WAREHOUSE
              value: s3://warehouse/
            - name: CATALOG_IO__IMPL
              value: org.apache.iceberg.aws.s3.S3FileIO
            - name: CATALOG_S3_ENDPOINT
              value: http://minio.minio:9000
            - name: CATALOG_S3_PATH__STYLE__ACCESS
              value: "true"
            # MinIO credentials. Local copy lives in this namespace's
            # `minio-credentials` Secret because k8s secrets are namespace-
            # scoped. Must match k8s/minio.yaml's minio-secret values.
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_REGION
              value: us-east-1
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /v1/config
              port: 8181
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: iceberg-data
              mountPath: /data
      volumes:
        - name: iceberg-data
          persistentVolumeClaim:
            claimName: iceberg-data
---
apiVersion: v1
kind: Service
metadata:
  name: iceberg-rest
  namespace: iceberg
spec:
  type: ClusterIP
  selector:
    app: iceberg-rest
  ports:
    - name: rest
      port: 8181
      targetPort: 8181
