apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: iceberg-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iceberg-rest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iceberg-rest
  template:
    metadata:
      labels:
        app: iceberg-rest
    spec:
      containers:
        - name: iceberg-rest
          image: tabulario/iceberg-rest:1.6.0
          ports:
            - name: rest
              containerPort: 8181
          env:
            # Persist catalog state in sqlite on hostPath. Survives pod restarts.
            - name: CATALOG_URI
              value: jdbc:sqlite:/data/iceberg_rest.db
            - name: CATALOG_JDBC_USER
              value: ""
            - name: CATALOG_JDBC_PASSWORD
              value: ""
            # Warehouse lives in MinIO bucket created by minio-init.
            - name: CATALOG_WAREHOUSE
              value: s3://warehouse/
            - name: CATALOG_IO__IMPL
              value: org.apache.iceberg.aws.s3.S3FileIO
            - name: CATALOG_S3_ENDPOINT
              value: http://minio:9000
            - name: CATALOG_S3_PATH__STYLE__ACCESS
              value: "true"
            # MinIO credentials (must match minio-secret).
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_USER
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_PASSWORD
            - name: AWS_REGION
              value: us-east-1
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /v1/config
              port: 8181
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: iceberg-data
              mountPath: /data
      volumes:
        - name: iceberg-data
          persistentVolumeClaim:
            claimName: iceberg-data
---
apiVersion: v1
kind: Service
metadata:
  name: iceberg-rest
spec:
  type: ClusterIP
  selector:
    app: iceberg-rest
  ports:
    - name: rest
      port: 8181
      targetPort: 8181
