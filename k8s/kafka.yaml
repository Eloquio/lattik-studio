# Single-node Apache Kafka broker in KRaft mode (no ZooKeeper).
# Combined controller + broker process — suitable for local dev.
#
# In-cluster:  kafka.kafka:9092  (PLAINTEXT)
# From host:   localhost:9094    (EXTERNAL via NodePort 30094)
#              ↑ requires the kind-config.yaml port mapping; until the
#                cluster is recreated, use: kubectl -n kafka port-forward svc/kafka 9094:9094
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kafka-data
  namespace: kafka
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.9.0
          ports:
            - name: broker
              containerPort: 9092
            - name: external
              containerPort: 9094
            - name: controller
              containerPort: 9093
          env:
            # KRaft combined mode — single node acts as both broker and controller
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@localhost:9093"
            # Listeners
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092,EXTERNAL://:9094,CONTROLLER://:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka.kafka:9092,EXTERNAL://localhost:9094"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            # Storage
            - name: KAFKA_LOG_DIRS
              value: "/var/lib/kafka/data"
            # Single-replica defaults (local dev — no HA needed)
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            # Use broker-assigned timestamps (LogAppendTime) instead of the
            # producer-set CreateTime. Logger-writer derives ds/hour from
            # this timestamp, so we want a single, monotonic clock — the
            # broker's — and immunity to producer-side clock skew.
            - name: KAFKA_LOG_MESSAGE_TIMESTAMP_TYPE
              value: "LogAppendTime"
            # Fixed cluster ID for reproducible local dev
            - name: CLUSTER_ID
              value: "MkU3OEVBNTcwNTJENDM2Qk"
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1.5Gi"
              cpu: "1000m"
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
      volumes:
        - name: kafka-data
          persistentVolumeClaim:
            claimName: kafka-data
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: kafka
spec:
  type: NodePort
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
    - name: external
      port: 9094
      targetPort: 9094
      nodePort: 30094
