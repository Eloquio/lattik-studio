kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30432
        hostPort: 5432
        protocol: TCP
      - containerPort: 30300
        hostPort: 3300
        protocol: TCP
      - containerPort: 30222
        hostPort: 2222
        protocol: TCP
      - containerPort: 30808
        hostPort: 8080
        protocol: TCP
      - containerPort: 30900
        hostPort: 9000
        protocol: TCP
      - containerPort: 30901
        hostPort: 9001
        protocol: TCP
      - containerPort: 30888
        hostPort: 8088
        protocol: TCP
      - containerPort: 30818
        hostPort: 8181
        protocol: TCP
      - containerPort: 30094
        hostPort: 9094
        protocol: TCP
      - containerPort: 30081
        hostPort: 8081
        protocol: TCP
    extraMounts:
      - hostPath: /var/lib/lattik/airflow-dags
        containerPath: /var/local/airflow-dags
      - hostPath: /var/lib/lattik/airflow-logs
        containerPath: /var/local/airflow-logs
